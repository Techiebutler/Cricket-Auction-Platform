services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auction}
      POSTGRES_DB: ${POSTGRES_DB:-auction}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auction}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  migrator:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: always

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    command: arq app.worker.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      # These should typically be the public URLs. 
      # In production, relative paths work better for same-domain setups.
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://yourdomain.com/api/auction/ws}
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # If using Let's Encrypt / Certbot, mount SSL certificates here
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  redis_data:
