services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auction}
      POSTGRES_DB: ${POSTGRES_DB:-auction}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auction}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  migrator:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    command: alembic upgrade head
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      traefik:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${PUBLIC_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.backend.middlewares=api-strip@docker
      - traefik.http.services.backend.loadbalancer.server.port=8000
    restart: always

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    command: arq app.worker.WorkerSettings
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auction}:${POSTGRES_PASSWORD:-auction}@db:5432/${POSTGRES_DB:-auction}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      # These should typically be the public URLs. 
      # In production, relative paths work better for same-domain setups.
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: wss://${PUBLIC_DOMAIN}/api/auction/ws
    depends_on:
      - backend
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${PUBLIC_DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    restart: always

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:
